<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Product Discovery</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            max-width: 700px;
            margin: auto;
        }

        select {
            flex: 1;
            padding: 12px;
            background: #0f172a;
            color: white;
            border-radius: 8px;
        }

        button {
            padding: 12px 20px;
            background: #6366f1;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            background: #1e293b;
            margin: 10px;
            padding: 10px;
            width: 200px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <h1>Product Discovery</h1>
    <p>AI-powered recommendations</p>

    <div class="controls">
        <select id="productSelect">
            <option value="" disabled selected>Select a product</option>

            {% for product in catalog %}
            <option value="{{ product.product_id }}" data-name="{{ product.product_name }}"
                data-category="{{ product.category }}" data-price="{{ product.price }}"
                data-image="{{ product.image_url }}">
                {{ product.product_name }}
            </option>
            {% endfor %}
        </select>

        <button onclick="getRec()">Find Similar Items</button>
    </div>

    <!-- Selected Product -->
    <h2 id="selectedTitle" style="display:none;">Selected Product</h2>
    <div id="selectedProduct" class="grid"></div>

    <!-- Recommendations -->
    <h2 id="recTitle" style="display:none;">You Might Also Like</h2>
    <div id="results" class="grid"></div>

    <script>
        function getRec() {
            let select = document.getElementById("productSelect");
            let id = select.value;

            if (!id) {
                alert("Select a product first");
                return;
            }

            let option = select.options[select.selectedIndex];

            let name = option.getAttribute("data-name");
            let category = option.getAttribute("data-category");
            let price = option.getAttribute("data-price");
            let image = option.getAttribute("data-image");

            // Show selected product
            document.getElementById("selectedTitle").style.display = "block";
            document.getElementById("selectedProduct").innerHTML = `
        <div class="card">
            <img src="${image}" 
                 onerror="this.src='https://via.placeholder.com/300'">
            <h4>${name}</h4>
            <p>${category}</p>
            <p>₹${price}</p>
        </div>
    `;

            // Fetch recommendations
            fetch(`/recommend/${id}`)
                .then(res => res.json())
                .then(data => {
                    let container = document.getElementById("results");
                    container.innerHTML = "";

                    if (data.error) {
                        container.innerHTML = data.error;
                        return;
                    }

                    document.getElementById("recTitle").style.display = "block";

                    data.recommendations.forEach(p => {
                        container.innerHTML += `
                <div class="card">
                    <img src="${p.image_url}" 
                         onerror="this.src='https://via.placeholder.com/300'">
                    <h4>${p.product_name}</h4>
                    <p>${p.category}</p>
                    <p>₹${p.price}</p>
                </div>
            `;
                    });
                });
        }
    </script>

</body>

</html>
